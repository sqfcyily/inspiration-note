<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵感便签</title>
  <!-- Stylesheets -->
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet" href="styles/note-card.css">
  <link rel="stylesheet" href="styles/modal.css">
  <!-- Load Marked library for Markdown parsing -->
  <script src="../node_modules/marked/marked.min.js"></script>
  <!-- Load Prism.js for syntax highlighting -->
  <script src="../node_modules/prismjs/prism.js"></script>
  <script src="../node_modules/prismjs/components/prism-bash.min.js"></script>
  <script src="../node_modules/prismjs/components/prism-json.min.js"></script>
  <script src="../node_modules/prismjs/components/prism-python.min.js"></script>
  <script src="../node_modules/prismjs/components/prism-sql.min.js"></script>
</head>
<body class="dark-theme">
  <!-- Frameless Titlebar -->
  <header class="titlebar">
    <div class="titlebar-drag-area"></div>
    <div class="titlebar-brand">
      <img class="brand-icon" src="assets/icon.png" width="16" height="16" alt="Icon">
      <span class="brand-name">灵感便签</span>
    </div>
    
    <div class="titlebar-search">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
        <input type="text" id="search-input" placeholder="搜索便签内容或标题..." autocomplete="off">
        <button id="search-clear-btn" style="display: none;">
          <svg viewBox="0 0 24 24" width="12" height="12"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>
    
    <div class="titlebar-actions">
      <!-- Theme Switcher -->
      <button id="theme-toggle-btn" class="titlebar-btn" title="切换主题">
        <!-- Sun icon -->
        <svg class="theme-icon-sun" viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.01c.39-.39.39-1.03 0-1.41s-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <!-- Moon icon -->
        <svg class="theme-icon-moon" viewBox="0 0 24 24" width="16" height="16" style="display: none;">
          <path fill="currentColor" d="M12.3 22h-.1c-5.4 0-10-4.6-10-10 0-4.3 3-8.1 7.1-9 1-.2 1.9.5 2.1 1.4.2.9-.3 1.8-1.2 2.1-2.8 1-4.7 3.7-4.7 6.8 0 3.9 3.1 7 7 7 3 0 5.6-1.9 6.6-4.6.3-.8 1.2-1.3 2.1-1.1.9.2 1.5 1.1 1.3 2.1-.8 4-4.5 6.9-8.8 6.9z"/>
        </svg>
      </button>
      
      <!-- Window controls -->
      <button id="win-min-btn" class="titlebar-btn" title="最小化">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <button id="win-max-btn" class="titlebar-btn" title="最大化/还原">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/></svg>
      </button>
      <button id="win-close-btn" class="titlebar-btn win-close-btn" title="关闭 (最小化到系统托盘)">
        <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  </header>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-new-note-container">
        <button id="new-note-btn" class="btn btn-primary">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          <span>新建便签</span>
        </button>
      </div>

      <nav class="sidebar-nav">
        <!-- Quick Filters -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">视图</div>
          <ul class="sidebar-menu">
            <li class="sidebar-menu-item active" data-filter="all">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
              <span>所有便签</span>
              <span class="count-badge" id="count-all">0</span>
            </li>
            <li class="sidebar-menu-item" data-filter="starred">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              <span>我的收藏</span>
              <span class="count-badge" id="count-starred">0</span>
            </li>
            <li class="sidebar-menu-item" data-filter="pinned">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
              <span>已置顶</span>
              <span class="count-badge" id="count-pinned">0</span>
            </li>
          </ul>
        </div>

        <!-- Categories -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">分类</div>
          <ul class="sidebar-menu" id="categories-list">
            <!-- Dynamically populated -->
          </ul>
          <div class="add-category-row">
            <button id="add-category-toggle-btn" class="add-category-btn-toggle">
              <svg viewBox="0 0 24 24" width="12" height="12"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              <span>添加分类</span>
            </button>
            <div id="add-category-form" class="add-category-form" style="display: none;">
              <!-- Icon Selector Button -->
              <button type="button" id="new-category-icon-btn" class="category-icon-select-btn" title="选择图标">💡</button>
              <!-- Name Input -->
              <input type="text" id="new-category-name" placeholder="名称..." maxlength="10" autocomplete="off">
              <!-- Action buttons -->
              <button id="new-category-submit" class="btn-category-action submit" title="确定">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
              </button>
              <button id="new-category-cancel" class="btn-category-action cancel" title="取消">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
              </button>
              
              <!-- Emoji Picker Grid Popover -->
              <div id="new-category-emoji-picker" class="emoji-picker-popup" style="display: none;"></div>
            </div>
          </div>
        </div>

        <!-- Tags -->
        <div class="sidebar-section">
          <div class="sidebar-section-title">标签</div>
          <div class="tags-cloud" id="tags-list">
            <!-- Dynamically populated -->
          </div>
        </div>
      </nav>
      
      <!-- Logo/Version -->
      <div class="sidebar-footer">
        <span class="version-text">v1.0.0</span>
      </div>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
      <!-- Notes Wall -->
      <div id="notes-board" class="board notes-free-mode">
        <!-- Empty State -->
        <div class="empty-state" id="empty-state">
          <div class="empty-state-icon">📝</div>
          <h3>开启你的灵感之旅</h3>
          <p>双击空白区域，或者点击“新建便签”来记录你此刻的想法。</p>
        </div>
        
        <!-- Notes container -->
        <div id="notes-container" class="notes-container"></div>
      </div>
    </main>
  </div>

  <!-- Status Bar -->
  <footer class="statusbar">
    <div class="statusbar-left">
      <span id="note-count-status">便签总数: 0</span>
    </div>
    
    <div class="statusbar-right">
      <div class="statusbar-setting-group">
        <label>布局模式:</label>
        <div class="btn-group">
          <button id="layout-free-btn" class="btn btn-toggle active" title="自由拖拽排列便签">自由托拽</button>
          <button id="layout-auto-btn" class="btn btn-toggle" title="网格自动排列便签">网格自动</button>
        </div>
      </div>
      
      <div class="statusbar-setting-group" id="sort-setting-container" style="display: none;">
        <label>排序方式:</label>
        <select id="sort-select">
          <option value="updated_at">更新时间</option>
          <option value="created_at">创建时间</option>
          <option value="priority">优先级</option>
        </select>
      </div>
    </div>
  </footer>

  <!-- Editor Modal -->
  <div id="editor-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <div class="modal-header">
        <input type="text" id="editor-title" placeholder="便签标题 (可选)..." maxlength="50" autocomplete="off">
        <div class="modal-header-actions">
          <button id="editor-close-btn" class="modal-action-btn" title="关闭">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>
      
      <div class="modal-settings">
        <!-- Color Picker -->
        <div class="modal-setting-item">
          <label>颜色</label>
          <div class="color-picker-palette" id="editor-color-palette">
            <!-- Dynamically populated with colors -->
          </div>
        </div>
        
        <!-- Category & Priority -->
        <div class="modal-setting-row">
          <div class="modal-setting-item">
            <label for="editor-category">分类</label>
            <select id="editor-category">
              <!-- Dynamically populated -->
            </select>
          </div>
          
          <div class="modal-setting-item">
            <label>优先级</label>
            <div class="btn-group priority-group">
              <button class="btn btn-toggle" data-priority="low">低</button>
              <button class="btn btn-toggle active" data-priority="medium">中</button>
              <button class="btn btn-toggle" data-priority="high">高</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Tab Controls for Edit/Preview -->
      <div class="editor-tabs">
        <button id="tab-edit-btn" class="editor-tab-btn active">编辑</button>
        <button id="tab-preview-btn" class="editor-tab-btn">预览 (Markdown)</button>
      </div>

      <div class="modal-body">
        <!-- Editor Textarea -->
        <textarea id="editor-content" placeholder="在此输入便签内容，支持 Markdown (加粗、斜体、列表、代码等)..."></textarea>
        
        <!-- Markdown Preview Panel -->
        <div id="editor-preview" class="markdown-preview" style="display: none;"></div>
      </div>
      
      <div class="modal-footer">
        <div class="modal-footer-left">
          <button id="editor-star-btn" class="modal-icon-btn" title="星标收藏">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg>
          </button>
          <button id="editor-pin-btn" class="modal-icon-btn" title="置顶">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2zm-5.2 2H9.2l1.8-1.8V4h2v8.2l1.8 1.8h-3.6z"/></svg>
          </button>
        </div>
        <div class="modal-footer-right">
          <button id="editor-delete-btn" class="btn btn-danger btn-secondary" style="margin-right: auto;">删除</button>
          <button id="editor-save-btn" class="btn btn-primary">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div id="confirm-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card confirm-card">
      <div class="confirm-body">
        <div class="confirm-icon-warning">⚠️</div>
        <h3 id="confirm-title">确定要删除吗？</h3>
        <p id="confirm-message">此操作将永久删除该项，且无法撤销。</p>
      </div>
      <div class="confirm-footer">
        <button id="confirm-cancel-btn" class="btn btn-secondary">取消</button>
        <button id="confirm-submit-btn" class="btn btn-danger">确认</button>
      </div>
    </div>
  </div>

  <!-- App scripts -->
  <script src="scripts/theme.js"></script>
  <script src="scripts/drag-manager.js"></script>
  <script src="scripts/layout-manager.js"></script>
  <script src="scripts/note-manager.js"></script>
  <script src="scripts/search.js"></script>
  <script src="scripts/sidebar.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
